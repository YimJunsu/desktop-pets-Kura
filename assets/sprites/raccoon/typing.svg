<svg viewBox="0 0 32 32" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="1.5" stdDeviation="1.2" flood-color="#000" flood-opacity="0.25" />
    </filter>
  </defs>
  <style>
    @keyframes blink {
      0%, 90%, 100% { transform: scaleY(1); }
      95% { transform: scaleY(0.1); }
    }
    .eye {
      transform-origin: center;
      animation: blink 4s infinite;
      transition: transform 0.1s ease-out;
    }
    @keyframes type-left {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-1.8px); }
    }
    @keyframes type-right {
      0%, 100% { transform: translateY(-1.8px); }
      50% { transform: translateY(0); }
    }
    .front-leg-left {
      animation: type-left 0.16s infinite ease-in-out;
      transform-origin: 10px 21px;
    }
    .front-leg-right {
      animation: type-right 0.16s infinite ease-in-out;
      transform-origin: 15px 21px;
    }
    @keyframes type-code-1 {
      0%, 100% { width: 0; }
      15%, 85% { width: 4.5px; }
    }
    @keyframes type-code-2 {
      0%, 20%, 100% { width: 0; }
      35%, 85% { width: 5.5px; }
    }
    @keyframes type-code-3 {
      0%, 40%, 100% { width: 0; }
      55%, 85% { width: 3.5px; }
    }
    @keyframes type-code-4 {
      0%, 60%, 100% { width: 0; }
      75%, 85% { width: 5px; }
    }
    .code-line-1 {
      animation: type-code-1 1.5s infinite steps(4, end);
    }
    .code-line-2 {
      animation: type-code-2 1.5s infinite steps(5, end);
    }
    .code-line-3 {
      animation: type-code-3 1.5s infinite steps(3, end);
    }
    .code-line-4 {
      animation: type-code-4 1.5s infinite steps(5, end);
    }
  </style>

  <!-- White Sticker Outline for Contrast -->
  <g transform="translate(4, 4)" fill="none" stroke="#ffffff" stroke-width="2.2" stroke-linejoin="round" stroke-linecap="round" filter="url(#shadow)">
    <!-- Ears -->
    <path d="M 8 7 L 5 1.5 L 11 3.5 Z M 24 7 L 27 1.5 L 21 3.5 Z" />
    <!-- Body -->
    <rect x="7" y="15" width="18" height="9" rx="4.5" />
    <!-- Tail -->
    <path d="M 23 18 C 27 18 29.5 14 26 9 C 23.5 12.5 22.5 16 23 18 Z" />
    <!-- Head -->
    <ellipse cx="16" cy="11.5" rx="9" ry="7.5" />
  </g>

  <!-- Main Raccoon Body Group -->
  <g transform="translate(4, 4)" class="raccoon-body">
    
    <!-- Tail Segment 1 (Body side, grey) -->
    <path d="M 23 18 C 24.5 18 25.5 17 25 15.5 C 24 16 23.5 17 23 18 Z" fill="#4b5563" stroke="#1E1B18" stroke-width="0.8" />
    <!-- Tail Segment 2 (dark stripe) -->
    <path d="M 25 15.5 C 26 15.5 26.8 14.5 26 13 C 25 14 24.5 15 25 15.5 Z" fill="#9ca3af" stroke="#1E1B18" stroke-width="0.8" />
    <!-- Tail Segment 3 (grey) -->
    <path d="M 26 13 C 27 13 28 12 27 11 C 26 11.8 25.2 12.5 26 13 Z" fill="#4b5563" stroke="#1E1B18" stroke-width="0.8" />
    <!-- Tail Segment 4 (dark stripe) -->
    <path d="M 27 11 C 28.5 11 29 10 27.5 9 C 26.5 9.8 26.2 10.5 27 11 Z" fill="#9ca3af" stroke="#1E1B18" stroke-width="0.8" />
    <!-- Tail Tip (Segment 5, dark grey) -->
    <path d="M 27.5 9 C 28.5 9 29.5 9.5 26 9 C 26 9 26.5 9 27.5 9 Z" fill="#4b5563" stroke="#1E1B18" stroke-width="0.8" />

    <!-- Gray Body -->
    <rect x="7" y="15" width="18" height="9" rx="4.5" fill="#9ca3af" stroke="#1E1B18" stroke-width="0.8" />

    <!-- Jagged White Fur -->
    <path d="M 12 15 L 10 17.5 L 13 17.5 L 11 21 L 16 24.5 L 21 21 L 19 17.5 L 22 17.5 L 20 15 Z" fill="#f3f4f6" stroke="#1E1B18" stroke-width="0.8" stroke-linejoin="round" />

    <!-- Legs & Paws (swing with animation) -->
    <g class="left-legs">
      <!-- Front Left Leg -->
      <rect class="front-leg-left" x="9" y="21" width="2.5" height="4.5" rx="1.2" fill="#4b5563" stroke="#1E1B18" stroke-width="0.8" />
      <!-- Rear Left Leg -->
      <rect x="5.5" y="19" width="3.5" height="5.5" rx="1.7" fill="#9ca3af" stroke="#1E1B18" stroke-width="0.8" />
    </g>
    
    <g class="right-legs">
      <!-- Front Right Leg -->
      <rect class="front-leg-right" x="14.5" y="21" width="2.5" height="4.5" rx="1.2" fill="#4b5563" stroke="#1E1B18" stroke-width="0.8" />
      <!-- Rear Right Leg -->
      <rect x="17" y="19" width="3.5" height="5.5" rx="1.7" fill="#9ca3af" stroke="#1E1B18" stroke-width="0.8" />
    </g>

    <!-- Outer Ears (Gray) -->
    <path d="M 8 7 L 5 1.5 L 11 3.5 Z" fill="#9ca3af" stroke="#1E1B18" stroke-width="0.8" stroke-linejoin="round" />
    <path d="M 24 7 L 27 1.5 L 21 3.5 Z" fill="#9ca3af" stroke="#1E1B18" stroke-width="0.8" stroke-linejoin="round" />

    <!-- Inner Ears (White/Light Gray) -->
    <path d="M 8.5 6.5 L 6.5 3 L 10.5 4.5 Z" fill="#e5e7eb" />
    <path d="M 23.5 6.5 L 25.5 3 L 21.5 4.5 Z" fill="#e5e7eb" />

    <!-- Head Gray Base -->
    <ellipse cx="16" cy="11.5" rx="9" ry="7.5" fill="#9ca3af" stroke="#1E1B18" stroke-width="0.8" />

    <!-- Raccoon Dark Face Mask (Dark Grey) -->
    <path d="M 8 13.5 C 6 12 11 8.5 13.5 9.5 C 14.5 10.5 13.5 13.8 8 13.5 Z" fill="#374151" stroke="#1E1B18" stroke-width="0.8" />
    <path d="M 24 13.5 C 26 12 21 8.5 18.5 9.5 C 17.5 10.5 18.5 13.8 24 13.5 Z" fill="#374151" stroke="#1E1B18" stroke-width="0.8" />

    <!-- White Muzzle -->
    <ellipse cx="16" cy="13.2" rx="4.5" ry="3.2" fill="#f3f4f6" stroke="#1E1B18" stroke-width="0.8" />

    <!-- Eyes (Blinking animation) -->
    <g class="eye" id="left-eye-group">
      <ellipse cx="11.5" cy="11.2" rx="0.8" ry="1.2" fill="#1E1B18" />
    </g>
    <g class="eye" id="right-eye-group">
      <ellipse cx="20.5" cy="11.2" rx="0.8" ry="1.2" fill="#1E1B18" />
    </g>

    <!-- Nose (Black dot) -->
    <polygon points="15.2,12.5 16.8,12.5 16,13.2" fill="#1E1B18" />

    <!-- Whiskers -->
    <line x1="10.5" y1="13.5" x2="6.5" y2="13" stroke="#1E1B18" stroke-width="0.5" />
    <line x1="10.5" y1="14.2" x2="6.5" y2="14.2" stroke="#1E1B18" stroke-width="0.5" />
    <line x1="21.5" y1="13.5" x2="25.5" y2="13" stroke="#1E1B18" stroke-width="0.5" />
    <line x1="21.5" y1="14.2" x2="25.5" y2="14.2" stroke="#1E1B18" stroke-width="0.5" />

    <!-- Mini Keyboard -->
    <rect x="9.5" y="24" width="13" height="3" fill="#e5e7eb" stroke="#1E1B18" stroke-width="0.8" rx="0.5" />
    <line x1="11" y1="25.5" x2="21" y2="25.5" stroke="#9ca3af" stroke-dasharray="1.5 1" stroke-width="0.6" />
  </g>

  <!-- CMD Window on the LEFT side for Raccoon (to avoid overlapping the tail on the right) -->
  <g class="cmd-window" filter="url(#shadow)">
    <!-- Window Border/Screen -->
    <rect x="2" y="3" width="8" height="6" rx="0.5" fill="#1e1e1e" stroke="#9ca3af" stroke-width="0.4" />
    <!-- Top Bar -->
    <rect x="2" y="3" width="8" height="1.2" rx="0.3" fill="#333333" />
    <!-- Window buttons -->
    <circle cx="3.0" cy="3.6" r="0.25" fill="#ef4444" />
    <circle cx="3.7" cy="3.6" r="0.25" fill="#f59e0b" />
    <circle cx="4.4" cy="3.6" r="0.25" fill="#10b981" />
    <!-- Code Lines -->
    <rect class="code-line-1" x="3" y="4.8" width="0" height="0.4" fill="#22c55e" />
    <rect class="code-line-2" x="3" y="5.6" width="0" height="0.4" fill="#22c55e" />
    <rect class="code-line-3" x="3" y="6.4" width="0" height="0.4" fill="#22c55e" />
    <rect class="code-line-4" x="3" y="7.2" width="0" height="0.4" fill="#22c55e" />
  </g>
</svg>