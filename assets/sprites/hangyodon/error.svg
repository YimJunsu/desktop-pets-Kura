<svg viewBox="0 0 32 32" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="1.2" stdDeviation="1.0" flood-color="#000" flood-opacity="0.2" />
    </filter>
    <linearGradient id="blueGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#7CE3F0" />
      <stop offset="100%" stop-color="#4CB2C0" />
    </linearGradient>
    <linearGradient id="pinkGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#FCB3C7" />
      <stop offset="100%" stop-color="#F472B6" />
    </linearGradient>
  </defs>
    <g transform="translate(1.5, 3)" fill="none" stroke="#ffffff" stroke-width="2.2" stroke-linejoin="round" stroke-linecap="round" filter="url(#shadow)">
    
    <!-- Top Fin Outline -->
    <path d="M 12.0 7.5 C 11.5 4.0 13.5 2.5 15.0 3.5 C 16.2 2.0 18.5 2.5 19.0 5.0 C 19.8 4.5 21.0 5.0 20.2 7.5 Z" fill="#ffffff" stroke="#ffffff" stroke-width="2.2" stroke-linejoin="round" />
    <!-- Side Fins Outline -->
    <path d="M 6.0 14.5 C 4.0 14.5 4.0 18.0 6.0 18.0 Z" fill="#ffffff" stroke="#ffffff" stroke-width="2.2" stroke-linejoin="round" />
    <path d="M 24.0 14.5 C 26.0 14.5 26.0 18.0 24.0 18.0 Z" fill="#ffffff" stroke="#ffffff" stroke-width="2.2" stroke-linejoin="round" />
    <!-- Body Outline -->
    <ellipse cx="15" cy="22.5" rx="7.0" ry="5.5" fill="#ffffff" stroke="#ffffff" stroke-width="2.2" />
    <!-- Head Outline (Bell shaped head, wide at bottom) -->
    <path d="M 7.0 18.0 C 6.5 10.0 9.0 7.0 15.0 6.5 C 21.0 7.0 23.5 10.0 23.0 18.0 C 22.8 22.0 20.0 23.0 15.0 23.0 C 10.0 23.0 7.2 22.0 7.0 18.0 Z" fill="#ffffff" stroke="#ffffff" stroke-width="2.2" stroke-linejoin="round" />
    <!-- Sayuri Outline (Pink Octopus) -->
    <circle cx="24.0" cy="24.5" r="4.0" fill="#ffffff" stroke="#ffffff" stroke-width="2.2" />
  
    
  </g>

  <g transform="translate(1.5, 3)">
    
    <!-- Top Fin (Crest) -->
    <path d="M 12.0 7.5 C 11.5 4.0 13.5 2.5 15.0 3.5 C 16.2 2.0 18.5 2.5 19.0 5.0 C 19.8 4.5 21.0 5.0 20.2 7.5 Z" fill="url(#blueGrad)" stroke="#1E1B18" stroke-width="0.8" stroke-linejoin="round" />
    <path d="M 15.0 3.5 L 15.0 7.0 M 17.5 4.2 L 17.0 7.0" stroke="#1E1B18" stroke-width="0.6" stroke-linecap="round" />

    <!-- Side Fins (Ears) -->
    <path d="M 6.0 14.5 C 4.5 14.5 4.5 18.0 6.0 18.0 Z" fill="url(#blueGrad)" stroke="#1E1B18" stroke-width="0.8" stroke-linejoin="round" />
    <line x1="4.5" y1="15.5" x2="6.0" y2="15.5" stroke="#1E1B18" stroke-width="0.6" />
    <line x1="4.5" y1="17.0" x2="6.0" y2="17.0" stroke="#1E1B18" stroke-width="0.6" />

    <path d="M 24.0 14.5 C 25.5 14.5 25.5 18.0 24.0 18.0 Z" fill="url(#blueGrad)" stroke="#1E1B18" stroke-width="0.8" stroke-linejoin="round" />
    <line x1="24.0" y1="15.5" x2="25.5" y2="15.5" stroke="#1E1B18" stroke-width="0.6" />
    <line x1="24.0" y1="17.0" x2="25.5" y2="17.0" stroke="#1E1B18" stroke-width="0.6" />

    <!-- Body -->
    <ellipse cx="15" cy="22.5" rx="6.5" ry="5.0" fill="url(#blueGrad)" stroke="#1E1B18" stroke-width="0.8" />
    
    <!-- Scales on chest (3 curly waves) -->
    <path d="M 12.5 22.0 Q 13.5 23.0 14.5 22.0 M 15.5 22.0 Q 16.5 23.0 17.5 22.0 M 14.0 24.0 Q 15.0 25.0 16.0 24.0" fill="none" stroke="#1E1B18" stroke-width="0.8" stroke-linecap="round" />

    <!-- Head (Bell shape) -->
    <path d="M 7.0 18.0 C 6.5 10.0 9.0 7.0 15.0 6.5 C 21.0 7.0 23.5 10.0 23.0 18.0 C 22.8 22.0 20.0 23.0 15.0 23.0 C 10.0 23.0 7.2 22.0 7.0 18.0 Z" fill="url(#blueGrad)" stroke="#1E1B18" stroke-width="0.8" stroke-linejoin="round" />

    <!-- Enormous White Eyes (Sitting exactly above the lips) -->
    <circle cx="10.8" cy="14.0" r="3.8" fill="#ffffff" stroke="#1E1B18" stroke-width="0.8" />
    <circle cx="19.2" cy="14.0" r="3.8" fill="#ffffff" stroke="#1E1B18" stroke-width="0.8" />

    <!-- Big Pink Fish Lips (Wide hot-dog shape) -->
    <path d="M 7.5 18.5 C 7.5 17.0 22.5 17.0 22.5 18.5 C 22.5 20.0 7.5 20.0 7.5 18.5 Z" fill="url(#pinkGrad)" stroke="#1E1B18" stroke-width="0.8" stroke-linejoin="round" />
    <!-- Mouth Gap -->
    <path d="M 8.5 18.5 H 21.5" fill="none" stroke="#1E1B18" stroke-width="0.8" stroke-linecap="round" />
  
    
      <!-- Sad trembling eyeballs -->
      <circle cx="11.5" cy="14.5" r="1.0" fill="#1E1B18" />
      <circle cx="18.5" cy="14.5" r="1.0" fill="#1E1B18" />

      <!-- Trembling wide mouth gap -->
      <path d="M 9.5 18.5 Q 15.0 19.8 20.5 18.5" fill="#742A2A" stroke="#1E1B18" stroke-width="0.8" />
      
      <!-- Tears stream -->
      <path d="M 11.5 15.5 C 11.5 17.0 11.0 19.0 11.0 21.0" stroke="#72CEFF" stroke-width="1.5" fill="none" stroke-linecap="round" />
      <path d="M 18.5 15.5 C 18.5 17.0 19.0 19.0 19.0 21.0" stroke="#72CEFF" stroke-width="1.5" fill="none" stroke-linecap="round" />

      <!-- Sayuri shocked -->
      <circle cx="25.0" cy="24.5" r="3.2" fill="url(#pinkGrad)" stroke="#1E1B18" stroke-width="0.8" />
      <!-- Wide eyes -->
      <circle cx="24.2" cy="24.2" r="0.6" fill="#ffffff" stroke="#1E1B18" stroke-width="0.4" />
      <circle cx="24.2" cy="24.2" r="0.2" fill="#1E1B18" />
      <circle cx="25.8" cy="24.2" r="0.6" fill="#ffffff" stroke="#1E1B18" stroke-width="0.4" />
      <circle cx="25.8" cy="24.2" r="0.2" fill="#1E1B18" />
      <!-- Open mouth -->
      <ellipse cx="25.0" cy="25.5" rx="0.5" ry="0.8" fill="#742A2A" stroke="#1E1B18" stroke-width="0.4" />
      <!-- White Naruto/Fishcake on head -->
      <circle cx="26.5" cy="22.2" r="0.8" fill="#ffffff" stroke="#1E1B18" stroke-width="0.4" />
      <path d="M 26.5 21.8 Q 26.8 22.0 26.5 22.6" fill="none" stroke="#E53E3E" stroke-width="0.3" stroke-linecap="round" />
    
  </g>
</svg>