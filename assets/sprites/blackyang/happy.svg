<svg viewBox="0 0 32 32" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="1.5" stdDeviation="1.2" flood-color="#000" flood-opacity="0.2" />
    </filter>
  </defs>
  <style>
    @keyframes bounce {
      0%, 100% { transform: translateY(0px); }
      50% { transform: translateY(-2.5px); }
    }
    @keyframes sparkle-glow {
      0%, 100% { transform: scale(0); opacity: 0; }
      50% { transform: scale(1); opacity: 1; }
    }
    .happy-pet {
      animation: bounce 0.4s infinite ease-in-out;
      transform-origin: 12px 20px;
    }
    .sparkle {
      transform-origin: center;
      animation: sparkle-glow 0.8s infinite ease-in-out;
      fill: #FFD700;
    }
    .s1 { animation-delay: 0s; transform-origin: 2px 4px; }
    .s2 { animation-delay: 0.4s; transform-origin: 22px 5px; }
  </style>
  <g transform="translate(4, 4)">
    <!-- White background outline silhouette -->
    <g class="happy-pet" fill="#ffffff" stroke="#ffffff" stroke-width="1.6" stroke-linejoin="miter" filter="url(#shadow)">
      <path d="M 5 5 L 5 2 H 7 V 5 H 17 V 2 H 19 V 5 V 10 H 22 V 13 H 19 V 14 H 23 V 8 H 21 V 14 H 19 V 17 H 17 V 20 H 15 V 17 H 9 V 20 H 7 V 17 H 5 V 13 H 2 V 10 H 5 Z" />
    </g>
    
    <!-- Foreground dark grey -->
    <g class="happy-pet">
      <path d="M 5 5 L 5 2 H 7 V 5 H 17 V 2 H 19 V 5 V 10 H 22 V 13 H 19 V 14 H 23 V 8 H 21 V 14 H 19 V 17 H 17 V 20 H 15 V 17 H 9 V 20 H 7 V 17 H 5 V 13 H 2 V 10 H 5 Z" fill="#1E1B18" />
      
      <!-- Squinty eyes inside white sockets -->
      <rect x="7" y="7" width="3" height="3" fill="#ffffff" />
      <rect x="14" y="7" width="3" height="3" fill="#ffffff" />
      <path d="M 7.5 7.5 L 9 8.5 L 7.5 9.5" stroke="#000000" stroke-width="0.8" stroke-linecap="round" stroke-linejoin="round" fill="none" />
      <path d="M 16.5 7.5 L 15 8.5 L 16.5 9.5" stroke="#000000" stroke-width="0.8" stroke-linecap="round" stroke-linejoin="round" fill="none" />
    </g>

    <!-- Sparkles -->
    <polygon class="sparkle s1" points="2,1 3,2 2,3 1,2" />
    <polygon class="sparkle s2" points="22,2 23,3 22,4 21,3" />
  </g>
</svg>
