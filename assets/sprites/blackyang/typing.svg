<svg viewBox="0 0 32 32" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="1.5" stdDeviation="1" flood-color="#000" flood-opacity="0.25" />
    </filter>
  </defs>
  <style>
    @keyframes type-left {
      0%, 100% { transform: translateY(0px); }
      50% { transform: translateY(1.8px); }
    }
    @keyframes type-right {
      0%, 100% { transform: translateY(1.8px); }
      50% { transform: translateY(0px); }
    }
    .left-paw {
      animation: type-left 0.15s infinite ease-in-out;
    }
    .right-paw {
      animation: type-right 0.15s infinite ease-in-out;
    }
  </style>
  <g transform="translate(4, 4)">
    <!-- White background outline silhouette -->
    <g fill="#ffffff" stroke="#ffffff" stroke-width="1.6" stroke-linejoin="miter" filter="url(#shadow)">
      <path d="M 5 5 L 5 2 H 7 V 5 H 17 V 2 H 19 V 5 V 10 H 22 V 13 H 19 V 14 H 23 V 8 H 21 V 14 H 19 V 17 H 17 V 20 H 15 V 17 H 9 V 20 H 7 V 17 H 5 V 13 H 2 V 10 H 5 Z" />
      <rect x="6.5" y="15.5" width="11" height="3" />
      <rect class="left-paw" x="8" y="13.5" width="2.2" height="3.5" />
      <rect class="right-paw" x="13.8" y="13.5" width="2.2" height="3.5" />
    </g>
    
    <!-- Foreground dark grey -->
    <path d="M 5 5 L 5 2 H 7 V 5 H 17 V 2 H 19 V 5 V 10 H 22 V 13 H 19 V 14 H 23 V 8 H 21 V 14 H 19 V 17 H 17 V 20 H 15 V 17 H 9 V 20 H 7 V 17 H 5 V 13 H 2 V 10 H 5 Z" fill="#1E1B18" />
    
    <!-- Keyboard -->
    <rect x="6.5" y="15.5" width="11" height="3" fill="#4b5563" stroke="#9ca3af" stroke-width="0.4" />
    <line x1="8" y1="17" x2="16" y2="17" stroke="#9ca3af" stroke-width="0.4" stroke-dasharray="0.8 0.6" />
    
    <!-- Paws -->
    <rect class="left-paw" x="8" y="13.5" width="2.2" height="3.5" fill="#1E1B18" />
    <rect class="right-paw" x="13.8" y="13.5" width="2.2" height="3.5" fill="#1E1B18" />
    
    <!-- Focused eyes looking down -->
    <rect x="7" y="7" width="3" height="3" fill="#ffffff" />
    <rect x="14" y="7" width="3" height="3" fill="#ffffff" />
    <rect x="7.8" y="8.2" width="1.2" height="1.2" fill="#000000" />
    <rect x="14.8" y="8.2" width="1.2" height="1.2" fill="#000000" />
  </g>
</svg>
