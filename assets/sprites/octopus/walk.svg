<svg viewBox="0 0 32 32" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="1.5" stdDeviation="1" flood-color="#000" flood-opacity="0.2" />
    </filter>
  </defs>
  <style>
    @keyframes bob {
      0%, 100% { transform: translateY(0px); }
      50% { transform: translateY(0.6px); }
    }
    @keyframes swing-left {
      0%, 100% { transform: translateY(0px); }
      50% { transform: translateY(-1.5px); }
    }
    @keyframes swing-right {
      0%, 100% { transform: translateY(-1.5px); }
      50% { transform: translateY(0px); }
    }
    .body-bob {
      animation: bob 0.4s infinite ease-in-out;
    }
    .leg-left-pair {
      animation: swing-left 0.4s infinite ease-in-out;
    }
    .leg-right-pair {
      animation: swing-right 0.4s infinite ease-in-out;
    }
  </style>
  <g transform="translate(4, 4)">
    <!-- White background outline silhouette -->
    <g fill="#ffffff" stroke="#ffffff" stroke-width="1.6" stroke-linejoin="round" stroke-linecap="round" filter="url(#shadow)">
      <path class="body-bob" d="M21 17.079H3V14.05H0V10.95h3V5h18v5.95h3v3.1h-3z" />
      <rect class="leg-left-pair" x="4.487" y="17.079" width="1.513" height="2.921" />
      <rect class="leg-right-pair" x="7.488" y="17.079" width="1.512" height="2.921" />
      <rect class="leg-left-pair" x="15" y="17.079" width="1.513" height="2.921" />
      <rect class="leg-right-pair" x="18" y="17.079" width="1.513" height="2.921" />
    </g>
    
    <!-- Foreground coral color -->
    <g>
      <path class="body-bob" d="M21 17.079H3V14.05H0V10.95h3V5h18v5.95h3v3.1h-3z" fill="#D97757" />
      <rect class="leg-left-pair" x="4.487" y="17.079" width="1.513" height="2.921" fill="#D97757" />
      <rect class="leg-right-pair" x="7.488" y="17.079" width="1.512" height="2.921" fill="#D97757" />
      <rect class="leg-left-pair" x="15" y="17.079" width="1.513" height="2.921" fill="#D97757" />
      <rect class="leg-right-pair" x="18" y="17.079" width="1.513" height="2.921" fill="#D97757" />
    </g>

    <!-- Eyes (bob with body) -->
    <g class="body-bob" fill="#000000">
      <rect x="6" y="8.102" width="1.488" height="2.847" rx="0.2" ry="0.2" />
      <rect x="16.51" y="8.102" width="1.49" height="2.847" rx="0.2" ry="0.2" />
    </g>
  </g>
</svg>
