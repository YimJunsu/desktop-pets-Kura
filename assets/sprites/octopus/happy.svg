<svg viewBox="0 0 32 32" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="1.5" stdDeviation="1.2" flood-color="#000" flood-opacity="0.2" />
    </filter>
  </defs>
  <style>
    @keyframes bounce {
      0%, 100% { transform: translateY(0px); }
      50% { transform: translateY(-2.5px); }
    }
    @keyframes sparkle-glow {
      0%, 100% { transform: scale(0); opacity: 0; }
      50% { transform: scale(1); opacity: 1; }
    }
    .happy-pet {
      animation: bounce 0.4s infinite ease-in-out;
      transform-origin: 12px 20px;
    }
    .sparkle {
      transform-origin: center;
      animation: sparkle-glow 0.8s infinite ease-in-out;
      fill: #FFD700;
    }
    .s1 { animation-delay: 0s; transform-origin: 2px 4px; }
    .s2 { animation-delay: 0.4s; transform-origin: 22px 5px; }
  </style>
  <g transform="translate(4, 4)">
    <!-- White background outline silhouette -->
    <g class="happy-pet" fill="#ffffff" stroke="#ffffff" stroke-width="1.6" stroke-linejoin="round" stroke-linecap="round" filter="url(#shadow)">
      <path d="M20.998 10.949H24v3.102h-3v3.028h-1.487V20H18v-2.921h-1.487V20H15v-2.921H9V20H7.488v-2.921H6V20H4.487v-2.921H3V14.05H0V10.95h3V5h17.998v5.949z" />
    </g>
    
    <!-- Foreground coral color -->
    <g class="happy-pet">
      <path d="M20.998 10.949H24v3.102h-3v3.028h-1.487V20H18v-2.921h-1.487V20H15v-2.921H9V20H7.488v-2.921H6V20H4.487v-2.921H3V14.05H0V10.95h3V5h17.998v5.949z" fill="#D97757" />
      
      <!-- Squinty eyes (> <) -->
      <path d="M 6 8.3 L 7.5 9.5 L 6 10.7" stroke="#000000" stroke-width="1.0" stroke-linecap="round" stroke-linejoin="round" fill="none" />
      <path d="M 18 8.3 L 16.5 9.5 L 18 10.7" stroke="#000000" stroke-width="1.0" stroke-linecap="round" stroke-linejoin="round" fill="none" />
    </g>

    <!-- Sparkles -->
    <polygon class="sparkle s1" points="2,1 3,2 2,3 1,2" />
    <polygon class="sparkle s2" points="22,2 23,3 22,4 21,3" />
  </g>
</svg>
