      <path d="M20.998 10.949H23v3.102h-2v3.028h-1.487V20H18v-2.921h-1.487V20H15v-2.921H9V20H7.488v-2.921H6V20H4.487v-2.921H3V14.05H1V10.95h2V5h17.998v5.949z" fill="#D97757" />
      
