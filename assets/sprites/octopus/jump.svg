      <rect x="6" y="6.5" width="1.488" height="2.847" fill="#000000" rx="0.2" ry="0.2" />
      <rect x="16.51" y="6.5" width="1.49" height="2.847" fill="#000000" rx="0.2" ry="0.2" />
