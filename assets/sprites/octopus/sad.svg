<svg viewBox="0 0 32 32" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="1.5" stdDeviation="1" flood-color="#000" flood-opacity="0.18" />
    </filter>
  </defs>
  <style>
    @keyframes slump {
      0%, 100% { transform: translateY(0px) rotate(-1deg); }
      50% { transform: translateY(0.4px) rotate(1deg); }
    }
    @keyframes drip {
      0% { transform: translate(0px, 0px) scale(0); opacity: 0; }
      20% { transform: translate(0px, 0px) scale(1); opacity: 1; }
      80% { transform: translate(-0.5px, 5px) scale(1); opacity: 1; }
      100% { transform: translate(-0.5px, 6.5px) scale(0); opacity: 0; }
    }
    .sad-pet {
      animation: slump 2s infinite ease-in-out;
      transform-origin: 12px 20px;
    }
    .tear {
      animation: drip 1.8s infinite ease-in;
      transform-origin: 7px 11px;
    }
  </style>
  <g transform="translate(4, 4)">
    <!-- White background outline silhouette -->
    <g class="sad-pet" fill="#ffffff" stroke="#ffffff" stroke-width="1.6" stroke-linejoin="round" stroke-linecap="round" filter="url(#shadow)">
      <path d="M20.998 10.949H24v3.102h-3v3.028h-1.487V20H18v-2.921h-1.487V20H15v-2.921H9V20H7.488v-2.921H6V20H4.487v-2.921H3V14.05H0V10.95h3V5h17.998v5.949z" />
    </g>
    
    <!-- Foreground coral color -->
    <g class="sad-pet">
      <path d="M20.998 10.949H24v3.102h-3v3.028h-1.487V20H18v-2.921h-1.487V20H15v-2.921H9V20H7.488v-2.921H6V20H4.487v-2.921H3V14.05H0V10.95h3V5h17.998v5.949z" fill="#D97757" />
      
      <!-- Sad eyes (< >) -->
      <path d="M 7.5 8.3 L 6 9.5 L 7.5 10.7" stroke="#000000" stroke-width="1.0" stroke-linecap="round" stroke-linejoin="round" fill="none" />
      <path d="M 16.5 8.3 L 18 9.5 L 16.5 10.7" stroke="#000000" stroke-width="1.0" stroke-linecap="round" stroke-linejoin="round" fill="none" />
    </g>

    <!-- Crying Tear -->
    <path class="tear" d="M 6.8 11 Q 6.8 12.2, 7.3 12.2 Q 7.8 12.2, 7.8 11 Q 7.8 9.8, 7.3 9.8 Q 6.8 9.8, 6.8 11 z" fill="#3498db" />
  </g>
</svg>
