<svg viewBox="0 0 32 32" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="1.5" stdDeviation="1" flood-color="#000" flood-opacity="0.2" />
    </filter>
  </defs>
  <style>
    @keyframes slump {
      0%, 100% { transform: translateY(0px) rotate(-1deg); }
      50% { transform: translateY(0.4px) rotate(1deg); }
    }
    @keyframes drip {
      0% { transform: translate(0px, 0px) scale(0); opacity: 0; }
      20% { transform: translate(0px, 0px) scale(1); opacity: 1; }
      80% { transform: translate(-0.5px, 5px) scale(1); opacity: 1; }
      100% { transform: translate(-0.5px, 6.5px) scale(0); opacity: 0; }
    }
    .sad-pet {
      animation: slump 2s infinite ease-in-out;
      transform-origin: 12px 20px;
    }
    .tear {
      animation: drip 1.8s infinite ease-in;
      transform-origin: 8.5px 10px;
    }
  </style>
  <g transform="translate(4, 4)">
    <!-- White background outline silhouette -->
    <g class="sad-pet" fill="#ffffff" stroke="#ffffff" stroke-width="1.6" stroke-linejoin="miter" filter="url(#shadow)">
      <path d="M 5 5 L 5 2 H 7 V 5 H 17 V 2 H 19 V 5 V 10 H 22 V 13 H 19 V 14 H 23 V 8 H 21 V 14 H 19 V 17 H 17 V 20 H 15 V 17 H 9 V 20 H 7 V 17 H 5 V 13 H 2 V 10 H 5 Z" />
    </g>
    
    <!-- Foreground dark grey -->
    <g class="sad-pet">
      <path d="M 5 5 L 5 2 H 7 V 5 H 17 V 2 H 19 V 5 V 10 H 22 V 13 H 19 V 14 H 23 V 8 H 21 V 14 H 19 V 17 H 17 V 20 H 15 V 17 H 9 V 20 H 7 V 17 H 5 V 13 H 2 V 10 H 5 Z" fill="#FF9F43" />
      
      <!-- Sad eyes inside white sockets -->
      <rect x="7" y="7" width="3" height="3" fill="#ffffff" />
      <!-- CheeseYang Pixel Details (Synced inside head/body bob group) -->
      <!-- Pink inner ears -->
      <rect x="5.5" y="2.5" width="1" height="1" fill="#FFB6C1" />
      <rect x="17.5" y="2.5" width="1" height="1" fill="#FFB6C1" />
      
      <!-- Tabby Stripes -->
      <rect x="11" y="3" width="2" height="1" fill="#D35400" />
      <rect x="11" y="5" width="2" height="1" fill="#D35400" />
      <rect x="5" y="8" width="1" height="2" fill="#D35400" />
      <rect x="18" y="8" width="1" height="2" fill="#D35400" />
      <rect x="17" y="12" width="2" height="1" fill="#D35400" />
      <rect x="18" y="14" width="2" height="1" fill="#D35400" />
      <rect x="19" y="16" width="2" height="1" fill="#D35400" />
      <rect x="21" y="9" width="1" height="1" fill="#D35400" />
      <rect x="22" y="11" width="1" height="1" fill="#D35400" />
      
      <!-- White Muzzle & Pink Nose -->
      <rect x="9.5" y="9.5" width="5" height="2.5" fill="#FFFFFF" rx="0.5" />
      <rect x="11.5" y="10" width="1" height="0.8" fill="#FF8B94" />
    
      <rect x="14" y="7" width="3" height="3" fill="#ffffff" />
      <path d="M 9.5 7.5 L 8 8.5 L 9.5 9.5" stroke="#000000" stroke-width="0.8" stroke-linecap="round" stroke-linejoin="round" fill="none" />
      <path d="M 14.5 7.5 L 16 8.5 L 14.5 9.5" stroke="#000000" stroke-width="0.8" stroke-linecap="round" stroke-linejoin="round" fill="none" />
    </g>

    <!-- Crying Tear -->
    <path class="tear" d="M 8 11 Q 8 12.2, 8.5 12.2 Q 9 12.2, 9 11 Q 9 9.8, 8.5 9.8 Q 8 9.8, 8 11 z" fill="#3498db" />
  </g>
</svg>
