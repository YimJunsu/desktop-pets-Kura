<svg viewBox="0 0 32 32" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2.5" stdDeviation="1.5" flood-color="#000" flood-opacity="0.2" />
    </filter>
  </defs>
  <style>
    @keyframes dangle {
      0%, 100% { transform: rotate(-2deg); }
      50% { transform: rotate(2deg); }
    }
    .drag-pet {
      transform: scaleY(1.3) scaleX(0.78);
      transform-origin: 12px 0px;
      animation: dangle 0.8s infinite ease-in-out;
    }
  </style>
  <g transform="translate(4, 4)">
    <!-- White background outline silhouette -->
    <g class="drag-pet" fill="#ffffff" stroke="#ffffff" stroke-width="1.6" stroke-linejoin="miter" filter="url(#shadow)">
      <path d="M 5 5 L 5 2 H 7 V 5 H 17 V 2 H 19 V 5 V 10 H 22 V 13 H 19 V 14 H 23 V 8 H 21 V 14 H 19 V 17.5 H 17 V 21 H 15 V 17.5 H 9 V 21 H 7 V 17.5 H 5 V 13 H 2 V 10 H 5 Z" />
    </g>
    
    <!-- Foreground dark grey -->
    <g class="drag-pet">
      <path d="M 5 5 L 5 2 H 7 V 5 H 17 V 2 H 19 V 5 V 10 H 22 V 13 H 19 V 14 H 23 V 8 H 21 V 14 H 19 V 17.5 H 17 V 21 H 15 V 17.5 H 9 V 21 H 7 V 17.5 H 5 V 13 H 2 V 10 H 5 Z" fill="#FF9F43" />
      
      <!-- Surprised wide-open eyes -->
      <rect x="7" y="7" width="3" height="3" fill="#ffffff" />
      <!-- CheeseYang Pixel Details (Synced inside head/body bob group) -->
      <!-- Pink inner ears -->
      <rect x="5.5" y="2.5" width="1" height="1" fill="#FFB6C1" />
      <rect x="17.5" y="2.5" width="1" height="1" fill="#FFB6C1" />
      
      <!-- Tabby Stripes -->
      <rect x="11" y="3" width="2" height="1" fill="#D35400" />
      <rect x="11" y="5" width="2" height="1" fill="#D35400" />
      <rect x="5" y="8" width="1" height="2" fill="#D35400" />
      <rect x="18" y="8" width="1" height="2" fill="#D35400" />
      <rect x="17" y="12" width="2" height="1" fill="#D35400" />
      <rect x="18" y="14" width="2" height="1" fill="#D35400" />
      <rect x="19" y="16" width="2" height="1" fill="#D35400" />
      <rect x="21" y="9" width="1" height="1" fill="#D35400" />
      <rect x="22" y="11" width="1" height="1" fill="#D35400" />
      
      <!-- White Muzzle & Pink Nose -->
      <rect x="9.5" y="9.5" width="5" height="2.5" fill="#FFFFFF" rx="0.5" />
      <rect x="11.5" y="10" width="1" height="0.8" fill="#FF8B94" />
    
      <rect x="14" y="7" width="3" height="3" fill="#ffffff" />
      <rect x="8" y="8" width="1" height="1" fill="#000000" />
      <rect x="15" y="8" width="1" height="1" fill="#000000" />
    </g>
  </g>
</svg>
