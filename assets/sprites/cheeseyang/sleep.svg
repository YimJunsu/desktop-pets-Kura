<svg viewBox="0 0 32 32" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="1" stdDeviation="1" flood-color="#000" flood-opacity="0.2" />
    </filter>
  </defs>
  <style>
    @keyframes breathe {
      0%, 100% { transform: scaleY(0.8); }
      50% { transform: scaleY(0.85); }
    }
    @keyframes float-z1 {
      0% { transform: translate(0px, 0px) scale(0.4); opacity: 0; }
      50% { transform: translate(1px, -3px) scale(0.7); opacity: 0.8; }
      100% { transform: translate(2px, -6px) scale(1); opacity: 0; }
    }
    @keyframes float-z2 {
      0% { transform: translate(0px, 0px) scale(0.4); opacity: 0; }
      50% { transform: translate(-1px, -3px) scale(0.7); opacity: 0.8; }
      100% { transform: translate(-2px, -6px) scale(1); opacity: 0; }
    }
    .sleeping-pet {
      animation: breathe 3s infinite ease-in-out;
      transform-origin: 12px 20px;
    }
    .z1 {
      animation: float-z1 3s infinite linear;
      transform-origin: 18px 8px;
    }
    .z2 {
      animation: float-z2 3s infinite linear;
      animation-delay: 1.5s;
      transform-origin: 18px 8px;
    }
    .zzz-text {
      font-family: 'Arial', sans-serif;
      font-size: 3.5px;
      font-weight: bold;
      fill: #ffffff;
      stroke: #1E1B18;
      stroke-width: 0.6px;
    }
  </style>
  <g transform="translate(4, 4)">
    <!-- White background outline silhouette -->
    <g class="sleeping-pet" fill="#ffffff" stroke="#ffffff" stroke-width="1.6" stroke-linejoin="miter" filter="url(#shadow)">
      <path d="M 5 5 L 5 2 H 7 V 5 H 17 V 2 H 19 V 5 V 10 H 22 V 13 H 19 V 14 H 23 V 8 H 21 V 14 H 19 V 17 H 17 V 20 H 15 V 17 H 9 V 20 H 7 V 17 H 5 V 13 H 2 V 10 H 5 Z" />
    </g>
    
    <!-- Foreground dark grey -->
    <g class="sleeping-pet">
      <path d="M 5 5 L 5 2 H 7 V 5 H 17 V 2 H 19 V 5 V 10 H 22 V 13 H 19 V 14 H 23 V 8 H 21 V 14 H 19 V 17 H 17 V 20 H 15 V 17 H 9 V 20 H 7 V 17 H 5 V 13 H 2 V 10 H 5 Z" fill="#FF9F43" />
      
      <!-- Closed curved eyes inside white sockets -->
      <rect x="7" y="7" width="3" height="3" fill="#ffffff" />
      <!-- CheeseYang Pixel Details (Synced inside head/body bob group) -->
      <!-- Pink inner ears -->
      <rect x="5.5" y="2.5" width="1" height="1" fill="#FFB6C1" />
      <rect x="17.5" y="2.5" width="1" height="1" fill="#FFB6C1" />
      
      <!-- Tabby Stripes -->
      <rect x="11" y="3" width="2" height="1" fill="#D35400" />
      <rect x="11" y="5" width="2" height="1" fill="#D35400" />
      <rect x="5" y="8" width="1" height="2" fill="#D35400" />
      <rect x="18" y="8" width="1" height="2" fill="#D35400" />
      <rect x="17" y="12" width="2" height="1" fill="#D35400" />
      <rect x="18" y="14" width="2" height="1" fill="#D35400" />
      <rect x="19" y="16" width="2" height="1" fill="#D35400" />
      <rect x="21" y="9" width="1" height="1" fill="#D35400" />
      <rect x="22" y="11" width="1" height="1" fill="#D35400" />
      
      <!-- White Muzzle & Pink Nose -->
      <rect x="9.5" y="9.5" width="5" height="2.5" fill="#FFFFFF" rx="0.5" />
      <rect x="11.5" y="10" width="1" height="0.8" fill="#FF8B94" />
    
      <rect x="14" y="7" width="3" height="3" fill="#ffffff" />
      <path d="M 7.5 8.5 C 8 9.2, 9 9.2, 9.5 8.5" stroke="#000000" stroke-width="0.8" stroke-linecap="round" fill="none" />
      <path d="M 14.5 8.5 C 15 9.2, 16 9.2, 16.5 8.5" stroke="#000000" stroke-width="0.8" stroke-linecap="round" fill="none" />
    </g>

    <!-- Floating zZz text particles -->
    <g transform="translate(18, 8)">
      <text class="zzz-text z1" x="0" y="0">z</text>
      <text class="zzz-text z2" x="0" y="0">Z</text>
    </g>
  </g>
</svg>
