<svg viewBox="0 0 32 32" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="1.2" stdDeviation="1.0" flood-color="#000" flood-opacity="0.2" />
    </filter>
    <linearGradient id="whiteGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#FFFFFF" />
      <stop offset="100%" stop-color="#EFF5F8" />
    </linearGradient>
    <linearGradient id="blueGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#E2F5FF" />
      <stop offset="100%" stop-color="#8CD2FF" />
    </linearGradient>
    <linearGradient id="innerEarGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#E2F5FF" />
      <stop offset="100%" stop-color="#72CEFF" />
    </linearGradient>
  </defs>
    <!-- White Sticker Outline -->
  <g transform="translate(1.5, 4)" fill="none" stroke="#ffffff" stroke-width="2.2" stroke-linejoin="round" stroke-linecap="round" filter="url(#shadow)">
    <!-- Tail -->
    <path d="M 18 21 C 24 22 29 19 28 12 C 27.5 9 29.5 7 28 6 C 26.5 5 25.5 6 24.5 5 C 23.5 4 22 5 21 6.5 C 19 8.5 17.5 13.5 18 21" />
    <!-- Ears -->
    <circle cx="7.5" cy="7.5" r="3.5" />
    <circle cx="22.5" cy="7.5" r="3.5" />
    <!-- Body -->
    <ellipse cx="15" cy="20" rx="7.5" ry="5.5" />
    <!-- Head -->
    <ellipse cx="15" cy="14" rx="9" ry="8" />
    <!-- Cheek Fluff Outlines -->
    <path d="M 6.1 14.8 Q 5.0 15.8 5.8 16.8 Q 6.8 16.8 6.5 16" fill="#ffffff" stroke="#ffffff" stroke-width="2.2" stroke-linejoin="round" />
    <path d="M 23.9 14.8 Q 25.0 15.8 24.2 16.8 Q 23.2 16.8 23.5 16" fill="#ffffff" stroke="#ffffff" stroke-width="2.2" stroke-linejoin="round" />
    <!-- Flying Membranes / Wings Outlines -->
    <path d="M 7.5 18.5 Q 4.5 21.0 7.5 23.5" fill="#ffffff" stroke="#ffffff" stroke-width="2.2" stroke-linejoin="round" />
    <path d="M 22.5 18.5 Q 25.5 21.0 22.5 23.5" fill="#ffffff" stroke="#ffffff" stroke-width="2.2" stroke-linejoin="round" />
    <!-- Custom Pose Specific Outlines -->
    
  </g>

  <!-- Main Body Group -->
  <g transform="translate(1.5, 4)">
    <!-- Tail (Large, fluffy, light blue with sketchy fur lines) -->
    <path d="M 18 21 C 24 22 29 19 28 12 C 27.5 9 29.5 7 28 6 C 26.5 5 25.5 6 24.5 5 C 23.5 4 22 5 21 6.5 C 19 8.5 17.5 13.5 18 21" fill="url(#blueGrad)" stroke="#1E1B18" stroke-width="0.8" stroke-linejoin="round" />
    <!-- Sketchy Fur Lines on Tail -->
    <path d="M 23 8 C 24.5 7.5 25.5 8.5 25 9.5 M 26 10 C 27.5 9.5 28 11 27 12 M 28 13 C 29.2 12.5 29.5 14 28.5 15 M 27 16 C 28.0 16.0 27.8 17.5 26.8 17.5 M 25 18 C 26.0 18.5 25.2 19.8 24.2 19.5 M 21.5 20.2 C 22.2 21.2 21.0 22.0 20.2 21.2 M 24.5 5.5 C 25.2 4.5 26.2 5.5 25.5 6.5 M 27.5 7.5 C 28.2 6.8 29.0 7.8 28.2 8.5" stroke="#1E1B18" stroke-width="0.6" stroke-linecap="round" fill="none" />

    <!-- Gliding Wings (Flying Squirrel Membrane) -->
    <path d="M 7.5 18.5 Q 4.5 21.0 7.5 23.5" fill="url(#whiteGrad)" stroke="#1E1B18" stroke-width="0.8" stroke-linejoin="round" />
    <path d="M 22.5 18.5 Q 25.5 21.0 22.5 23.5" fill="url(#whiteGrad)" stroke="#1E1B18" stroke-width="0.8" stroke-linejoin="round" />

    <!-- Body -->
    <ellipse cx="15" cy="20" rx="7.5" ry="5.5" fill="url(#whiteGrad)" stroke="#1E1B18" stroke-width="0.8" />
    
    <!-- Cheek Fluff Spikes (Jagged Sketchy Style) -->
    <path d="M 6.1 14.8 Q 5.0 15.8 5.8 16.8 Q 6.8 16.8 6.5 16" fill="url(#whiteGrad)" stroke="#1E1B18" stroke-width="0.8" stroke-linejoin="round" />
    <path d="M 23.9 14.8 Q 25.0 15.8 24.2 16.8 Q 23.2 16.8 23.5 16" fill="url(#whiteGrad)" stroke="#1E1B18" stroke-width="0.8" stroke-linejoin="round" />
    
    <!-- Extra Cheek Fluff Strokes (Dangling lines for sketchy style) -->
    <path d="M 5.2 17 Q 4.0 18.2 4.8 18.5" fill="none" stroke="#1E1B18" stroke-width="0.6" stroke-linecap="round" />
    <path d="M 24.8 17 Q 26.0 18.2 25.2 18.5" fill="none" stroke="#1E1B18" stroke-width="0.6" stroke-linecap="round" />

    <!-- Left Ear -->
    <circle cx="7.5" cy="7.5" r="3.5" fill="url(#whiteGrad)" stroke="#1E1B18" stroke-width="0.8" />
    <circle cx="7.5" cy="7.5" r="2.0" fill="url(#innerEarGrad)" />
    <!-- Ear detail fold line -->
    <path d="M 6.5 6.0 Q 6.0 7.0 7.0 7.5" fill="none" stroke="#1E1B18" stroke-width="0.6" stroke-linecap="round" />

    <!-- Right Ear -->
    <circle cx="22.5" cy="7.5" r="3.5" fill="url(#whiteGrad)" stroke="#1E1B18" stroke-width="0.8" />
    <circle cx="22.5" cy="7.5" r="2.0" fill="url(#innerEarGrad)" />
    <!-- Ear detail fold line -->
    <path d="M 23.5 6.0 Q 24.0 7.0 23.0 7.5" fill="none" stroke="#1E1B18" stroke-width="0.6" stroke-linecap="round" />

    <!-- Head -->
    <ellipse cx="15" cy="14" rx="9" ry="8" fill="url(#whiteGrad)" stroke="#1E1B18" stroke-width="0.8" />
    
    <!-- Hair tuft (삐침머리) -->
    <path d="M 14.0 6 Q 15.0 3.5 16.0 6" fill="none" stroke="#1E1B18" stroke-width="0.8" stroke-linecap="round" />

    <!-- Rosy Cheeks -->
    <ellipse cx="9.5" cy="16.5" rx="1.8" ry="1.0" fill="#FFA3B1" />
    <ellipse cx="20.5" cy="16.5" rx="1.8" ry="1.0" fill="#FFA3B1" />
    <!-- Cheek lines -->
    <path d="M 8.7 17 L 9.3 16 M 9.7 17 L 10.3 16 M 19.7 17 L 20.3 16 M 20.7 17 L 21.3 16" stroke="#E55D75" stroke-width="0.4" stroke-linecap="round" />

    <!-- Whiskers -->
    <path d="M 5 14 L 2 13.5 M 4.5 15.5 L 1.5 15.8 M 5 17 L 2.5 17.5" stroke="#1E1B18" stroke-width="0.6" stroke-linecap="round" />
    <path d="M 25 14 L 28 13.5 M 25.5 15.5 L 28.5 15.8 M 25 17 L 27.5 17.5" stroke="#1E1B18" stroke-width="0.6" stroke-linecap="round" />

    <!-- Chest Fluff Lines -->
    <path d="M 13.2 19.5 Q 15.0 20.8 16.8 19.5" fill="none" stroke="#1E1B18" stroke-width="0.6" stroke-linecap="round" />
    <path d="M 13.8 20.2 Q 15.0 21.2 16.2 20.2" fill="none" stroke="#1E1B18" stroke-width="0.6" stroke-linecap="round" />

    <!-- Cute Round Blue Nose (Ref-Matched) -->
    <circle cx="15" cy="15.2" r="1.3" fill="url(#innerEarGrad)" stroke="#1E1B18" stroke-width="0.8" />

    <!-- Mouth (Cute wavy w-mouth) -->
    <path d="M 13.8 16.3 Q 14.4 17 15.0 16.3 Q 15.6 17 16.2 16.3" fill="none" stroke="#1E1B18" stroke-width="0.8" stroke-linecap="round" />

    <!-- Pose specific elements (Eyes, hands, keyboard) -->
    
      <!-- Falling dizzy eyes -->
      <path d="M 9.5 12.5 L 13.5 14.5 M 13.5 12.5 L 9.5 14.5" stroke="#1E1B18" stroke-width="1.0" stroke-linecap="round" />
      <path d="M 16.5 12.5 L 20.5 14.5 M 20.5 12.5 L 16.5 14.5" stroke="#1E1B18" stroke-width="1.0" stroke-linecap="round" />
      <!-- Hands pointing up -->
      <circle cx="6.0" cy="16.5" r="1.2" fill="url(#whiteGrad)" stroke="#1E1B18" stroke-width="0.8" />
      <circle cx="24.0" cy="16.5" r="1.2" fill="url(#whiteGrad)" stroke="#1E1B18" stroke-width="0.8" />
      <circle cx="9.0" cy="24.5" r="1.5" fill="url(#whiteGrad)" stroke="#1E1B18" stroke-width="0.8" />
      <circle cx="21.0" cy="24.5" r="1.5" fill="url(#whiteGrad)" stroke="#1E1B18" stroke-width="0.8" />
    
  </g>
</svg>