<svg viewBox="0 0 32 32" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="1.5" stdDeviation="1" flood-color="#000" flood-opacity="0.18" />
    </filter>
  </defs>
  <style>
    @keyframes type-left {
      0%, 100% { transform: translateY(0px); }
      50% { transform: translateY(1.8px); }
    }
    @keyframes type-right {
      0%, 100% { transform: translateY(1.8px); }
      50% { transform: translateY(0px); }
    }
    .left-paw {
      animation: type-left 0.15s infinite ease-in-out;
    }
    .right-paw {
      animation: type-right 0.15s infinite ease-in-out;
    }
    @keyframes type-code-1 {
      0%, 100% { width: 0; }
      15%, 85% { width: 4.5px; }
    }
    @keyframes type-code-2 {
      0%, 20%, 100% { width: 0; }
      35%, 85% { width: 5.5px; }
    }
    @keyframes type-code-3 {
      0%, 40%, 100% { width: 0; }
      55%, 85% { width: 3.5px; }
    }
    @keyframes type-code-4 {
      0%, 60%, 100% { width: 0; }
      75%, 85% { width: 5px; }
    }
    .code-line-1 {
      animation: type-code-1 1.5s infinite steps(4, end);
    }
    .code-line-2 {
      animation: type-code-2 1.5s infinite steps(5, end);
    }
    .code-line-3 {
      animation: type-code-3 1.5s infinite steps(3, end);
    }
    .code-line-4 {
      animation: type-code-4 1.5s infinite steps(5, end);
    }
  </style>
  <g transform="translate(4, 4)">
    <!-- White background outline silhouette -->
    <g fill="#ffffff" stroke="#ffffff" stroke-width="1.6" stroke-linejoin="round" stroke-linecap="round" filter="url(#shadow)">
      <!-- Main body -->
      <path d="M20.998 10.949H24v3.102h-3v3.028h-1.487V20H18v-2.921h-1.487V20H15v-2.921H9V20H7.488v-2.921H6V20H4.487v-2.921H3V14.05H0V10.95h3V5h17.998v5.949z" />
      <!-- Keyboard outline -->
      <rect x="6.5" y="15.5" width="11" height="3" rx="0.4" />
      <!-- Paws outline -->
      <rect class="left-paw" x="8" y="13.5" width="2.2" height="3.5" rx="0.6" />
      <rect class="right-paw" x="13.8" y="13.5" width="2.2" height="3.5" rx="0.6" />
    </g>
    
    <!-- Foreground elements -->
    <!-- Coral Body -->
    <path d="M20.998 10.949H24v3.102h-3v3.028h-1.487V20H18v-2.921h-1.487V20H15v-2.921H9V20H7.488v-2.921H6V20H4.487v-2.921H3V14.05H0V10.95h3V5h17.998v5.949z" fill="#D97757" />
    
    <!-- Grey Keyboard -->
    <rect x="6.5" y="15.5" width="11" height="3" fill="#4b5563" rx="0.4" stroke="#9ca3af" stroke-width="0.4" />
    <line x1="8" y1="17" x2="16" y2="17" stroke="#9ca3af" stroke-width="0.4" stroke-dasharray="0.8 0.6" />
    
    <!-- Coral Paws -->
    <rect class="left-paw" x="8" y="13.5" width="2.2" height="3.5" fill="#D97757" rx="0.6" />
    <rect class="right-paw" x="13.8" y="13.5" width="2.2" height="3.5" fill="#D97757" rx="0.6" />
    
    <!-- Focused eyes looking down at keyboard -->
    <g fill="#000000">
      <rect x="6.0" y="9.0" width="1.488" height="2.2" rx="0.2" ry="0.2" />
      <rect x="16.51" y="9.0" width="1.49" height="2.2" rx="0.2" ry="0.2" />
    </g>
  </g>

  <!-- CMD Window on the top right -->
  <g class="cmd-window" filter="url(#shadow)">
    <!-- Window Border/Screen -->
    <rect x="22" y="3" width="8" height="6" rx="0.5" fill="#1e1e1e" stroke="#9ca3af" stroke-width="0.4" />
    <!-- Top Bar -->
    <rect x="22" y="3" width="8" height="1.2" rx="0.3" fill="#333333" />
    <!-- Window buttons -->
    <circle cx="23.0" cy="3.6" r="0.25" fill="#ef4444" />
    <circle cx="23.7" cy="3.6" r="0.25" fill="#f59e0b" />
    <circle cx="24.4" cy="3.6" r="0.25" fill="#10b981" />
    <!-- Code Lines -->
    <rect class="code-line-1" x="23" y="4.8" width="0" height="0.4" fill="#22c55e" />
    <rect class="code-line-2" x="23" y="5.6" width="0" height="0.4" fill="#22c55e" />
    <rect class="code-line-3" x="23" y="6.4" width="0" height="0.4" fill="#22c55e" />
    <rect class="code-line-4" x="23" y="7.2" width="0" height="0.4" fill="#22c55e" />
  </g>
</svg>
