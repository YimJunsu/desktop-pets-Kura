<svg viewBox="0 0 32 32" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="1.5" stdDeviation="1.2" flood-color="#000" flood-opacity="0.22" />
    </filter>
  </defs>
  <style>
    @keyframes shake {
      0%, 100% { transform: translate(0, 0); }
      15% { transform: translate(-0.6px, 0.6px); }
      30% { transform: translate(0.6px, -0.6px); }
      45% { transform: translate(-0.6px, -0.6px); }
      60% { transform: translate(0.6px, 0.6px); }
      75% { transform: translate(-0.6px, 0.4px); }
      90% { transform: translate(0.6px, -0.4px); }
    }
    @keyframes flash {
      0%, 100% { opacity: 0.2; }
      50% { opacity: 1; }
    }
    .shaker {
      animation: shake 0.15s infinite;
      transform-origin: 12px 20px;
    }
    .warning-sign {
      animation: flash 0.5s infinite;
    }
  </style>
  <g transform="translate(4, 4)">
    <!-- White background outline silhouette -->
    <g class="shaker" fill="#ffffff" stroke="#ffffff" stroke-width="1.6" stroke-linejoin="round" stroke-linecap="round" filter="url(#shadow)">
      <path d="M20.998 10.949H24v3.102h-3v3.028h-1.487V20H18v-2.921h-1.487V20H15v-2.921H9V20H7.488v-2.921H6V20H4.487v-2.921H3V14.05H0V10.95h3V5h17.998v5.949z" />
    </g>
    
    <!-- Foreground coral color -->
    <g class="shaker">
      <path d="M20.998 10.949H24v3.102h-3v3.028h-1.487V20H18v-2.921h-1.487V20H15v-2.921H9V20H7.488v-2.921H6V20H4.487v-2.921H3V14.05H0V10.95h3V5h17.998v5.949z" fill="#D97757" />
      
      <!-- Shocked eyes: white sockets with tiny black pupils -->
      <rect x="6" y="8.102" width="1.488" height="2.847" fill="#ffffff" rx="0.2" ry="0.2" />
      <rect x="16.51" y="8.102" width="1.49" height="2.847" fill="#ffffff" rx="0.2" ry="0.2" />
      <circle cx="6.744" cy="9.525" r="0.4" fill="#000000" />
      <circle cx="17.255" cy="9.525" r="0.4" fill="#000000" />
    </g>

    <!-- Warning Icon above head -->
    <g class="warning-sign" transform="translate(12, 1)">
      <polygon points="0,-4 -4,3 4,3" fill="#f59e0b" stroke="#000000" stroke-width="0.5" stroke-linejoin="round" />
      <text x="0" y="2" font-family="'Arial', sans-serif" font-weight="bold" font-size="5.5" fill="#000000" text-anchor="middle">!</text>
    </g>
  </g>
</svg>
