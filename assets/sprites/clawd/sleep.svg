<svg viewBox="0 0 32 32" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="1" stdDeviation="1" flood-color="#000" flood-opacity="0.15" />
    </filter>
  </defs>
  <style>
    @keyframes breathe {
      0%, 100% { transform: scaleY(0.8); }
      50% { transform: scaleY(0.85); }
    }
    @keyframes float-z1 {
      0% { transform: translate(0px, 0px) scale(0.4); opacity: 0; }
      50% { transform: translate(1px, -3px) scale(0.7); opacity: 0.8; }
      100% { transform: translate(2px, -6px) scale(1); opacity: 0; }
    }
    @keyframes float-z2 {
      0% { transform: translate(0px, 0px) scale(0.4); opacity: 0; }
      50% { transform: translate(-1px, -3px) scale(0.7); opacity: 0.8; }
      100% { transform: translate(-2px, -6px) scale(1); opacity: 0; }
    }
    .sleeping-pet {
      animation: breathe 3s infinite ease-in-out;
      transform-origin: 12px 20px;
    }
    .z1 {
      animation: float-z1 3s infinite linear;
      transform-origin: 18px 8px;
    }
    .z2 {
      animation: float-z2 3s infinite linear;
      animation-delay: 1.5s;
      transform-origin: 18px 8px;
    }
    .zzz-text {
      font-family: 'Arial', sans-serif;
      font-size: 3.5px;
      font-weight: bold;
      fill: #ffffff;
      stroke: #D97757;
      stroke-width: 0.6px;
    }
  </style>
  <g transform="translate(4, 4)">
    <!-- White background outline silhouette -->
    <g class="sleeping-pet" fill="#ffffff" stroke="#ffffff" stroke-width="1.6" stroke-linejoin="round" stroke-linecap="round" filter="url(#shadow)">
      <path d="M20.998 10.949H24v3.102h-3v3.028h-1.487V20H18v-2.921h-1.487V20H15v-2.921H9V20H7.488v-2.921H6V20H4.487v-2.921H3V14.05H0V10.95h3V5h17.998v5.949z" />
    </g>
    
    <!-- Foreground coral color -->
    <g class="sleeping-pet">
      <path d="M20.998 10.949H24v3.102h-3v3.028h-1.487V20H18v-2.921h-1.487V20H15v-2.921H9V20H7.488v-2.921H6V20H4.487v-2.921H3V14.05H0V10.95h3V5h17.998v5.949z" fill="#D97757" />
      
      <!-- Closed curved eyes -->
      <path d="M 6 10 C 6.5 11, 7 11, 7.5 10" stroke="#000000" stroke-width="0.8" stroke-linecap="round" fill="none" />
      <path d="M 16.5 10 C 17 11, 17.5 11, 18 10" stroke="#000000" stroke-width="0.8" stroke-linecap="round" fill="none" />
    </g>

    <!-- Floating zZz text particles -->
    <g transform="translate(18, 8)">
      <text class="zzz-text z1" x="0" y="0">z</text>
      <text class="zzz-text z2" x="0" y="0">Z</text>
    </g>
  </g>
</svg>
