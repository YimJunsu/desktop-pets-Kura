<svg viewBox="0 0 32 32" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="1.2" stdDeviation="1.0" flood-color="#000" flood-opacity="0.2" />
    </filter>
    <linearGradient id="skinGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#FFEBE0" />
      <stop offset="100%" stop-color="#FFD1B3" />
    </linearGradient>
    <linearGradient id="hairGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#3C342E" />
      <stop offset="100%" stop-color="#1E1B18" />
    </linearGradient>
    <linearGradient id="snotGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#F0F9FF" />
      <stop offset="100%" stop-color="#BAE6FD" />
    </linearGradient>
  </defs>
    <g transform="translate(1.5, 3)" fill="none" stroke="#ffffff" stroke-width="2.2" stroke-linejoin="round" stroke-linecap="round" filter="url(#shadow)">
    
    <!-- Base Body & Head Outlines -->
    <ellipse cx="15" cy="26.5" rx="6.0" ry="5.5" fill="#ffffff" stroke="#ffffff" stroke-width="2.2" />
    <ellipse cx="15" cy="19.5" rx="6.5" ry="8.0" fill="#ffffff" stroke="#ffffff" stroke-width="2.2" />
    <!-- Hair Outline (Shifted up to clear the forehead) -->
    <path d="M 8.2 16 C 8.2 10 21.8 10 21.8 16 L 21.8 17 Q 20.7 15.3 19.8 16.7 Q 18.5 15 17.5 16.7 Q 16.2 14.7 15.0 16.3 Q 13.8 14.7 12.5 16.7 Q 11.5 15 10.2 16.7 Q 9.3 15.3 8.2 17 Z" fill="#ffffff" stroke="#ffffff" stroke-width="2.2" stroke-linejoin="round" />
  
    
      <!-- Stretched Snot Outline -->
      <path d="M 13.5 1.0 L 14.2 24.5 C 12.5 26 17.5 26 15.8 24.5 L 16.5 1.0 Z" fill="#ffffff" stroke="#ffffff" stroke-width="2.2" />
      <!-- Hands pointing up -->
      <circle cx="10" cy="24" r="1.8" fill="#ffffff" />
      <circle cx="20" cy="24" r="1.8" fill="#ffffff" />
      <!-- Dangling feet -->
      <circle cx="13" cy="31" r="1.8" fill="#ffffff" />
      <circle cx="17" cy="31" r="1.8" fill="#ffffff" />
    
  </g>

  <g transform="translate(1.5, 3)">
    
    <!-- Body -->
    <ellipse cx="15" cy="26.5" rx="5.5" ry="5.0" fill="url(#skinGrad)" stroke="#1E1B18" stroke-width="0.8" />
    <!-- White Pants / Diaper -->
    <path d="M 9.5 28.5 C 9.5 31.5 20.5 31.5 20.5 28.5 Z" fill="#ffffff" stroke="#1E1B18" stroke-width="0.8" />
    <line x1="9.5" y1="28.5" x2="20.5" y2="28.5" stroke="#1E1B18" stroke-width="0.8" />

    <!-- Head (Tall Vertical Egg Shape) -->
    <ellipse cx="15" cy="19.5" rx="6.5" ry="8.0" fill="url(#skinGrad)" stroke="#1E1B18" stroke-width="0.8" />

    <!-- Hair (Spiky fringe on forehead - shifted up) -->
    <path d="M 8.2 16 C 8.2 10 21.8 10 21.8 16 L 21.8 17 Q 20.7 15.3 19.8 16.7 Q 18.5 15 17.5 16.7 Q 16.2 14.7 15.0 16.3 Q 13.8 14.7 12.5 16.7 Q 11.5 15 10.2 16.7 Q 9.3 15.3 8.2 17 Z" fill="url(#hairGrad)" stroke="#1E1B18" stroke-width="0.8" stroke-linejoin="round" />
  
    
      <!-- Stretched Snot (Runny nose) going all the way up to y=1 (anchor point) -->
      <path d="M 13.5 1.0 L 14.2 24.5 C 12.5 26 17.5 26 15.8 24.5 L 16.5 1.0 Z" fill="url(#snotGrad)" stroke="#1E1B18" stroke-width="0.8" stroke-linejoin="round" />

      <!-- Eyebrows raised in surprise -->
      <path d="M 12.0 18.3 Q 13.0 16.3 14.0 18.3" fill="none" stroke="#1E1B18" stroke-width="0.6" stroke-linecap="round" />
      <path d="M 16.0 18.3 Q 17.0 16.3 18.0 18.3" fill="none" stroke="#1E1B18" stroke-width="0.6" stroke-linecap="round" />
      <!-- Wide Eyes -->
      <ellipse cx="13.0" cy="20" rx="0.8" ry="1.4" fill="#1E1B18" />
      <ellipse cx="17.0" cy="20" rx="0.8" ry="1.4" fill="#1E1B18" />
      <!-- Open mouth (Surprised) -->
      <ellipse cx="15" cy="23.5" rx="1.0" ry="1.4" fill="#742A2A" stroke="#1E1B18" stroke-width="0.5" />

      <!-- Arms raised up reaching for the snot -->
      <path d="M 9.5 28.0 Q 8.5 23.0 10.5 22.0" fill="none" stroke="#1E1B18" stroke-width="1.8" stroke-linecap="round" />
      <path d="M 20.5 28.0 Q 21.5 23.0 19.5 22.0" fill="none" stroke="#1E1B18" stroke-width="1.8" stroke-linecap="round" />
      
      <!-- Dangling Feet -->
      <circle cx="13" cy="30.5" r="1.3" fill="url(#skinGrad)" stroke="#1E1B18" stroke-width="0.8" />
      <circle cx="17" cy="30.5" r="1.3" fill="url(#skinGrad)" stroke="#1E1B18" stroke-width="0.8" />
    
  </g>
</svg>