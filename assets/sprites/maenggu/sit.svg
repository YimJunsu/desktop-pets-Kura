<svg viewBox="0 0 32 32" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="1.2" stdDeviation="1.0" flood-color="#000" flood-opacity="0.2" />
    </filter>
    <linearGradient id="skinGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#FFEBE0" />
      <stop offset="100%" stop-color="#FFD1B3" />
    </linearGradient>
    <linearGradient id="hairGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#3C342E" />
      <stop offset="100%" stop-color="#1E1B18" />
    </linearGradient>
    <linearGradient id="snotGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#F0F9FF" />
      <stop offset="100%" stop-color="#BAE6FD" />
    </linearGradient>
  </defs>
    <g transform="translate(1.5, 3)" fill="none" stroke="#ffffff" stroke-width="2.2" stroke-linejoin="round" stroke-linecap="round" filter="url(#shadow)">
    
    <!-- Base Body & Head Outlines -->
    <ellipse cx="15" cy="23.5" rx="6.0" ry="5.5" fill="#ffffff" stroke="#ffffff" stroke-width="2.2" />
    <ellipse cx="15" cy="16.5" rx="6.5" ry="8.0" fill="#ffffff" stroke="#ffffff" stroke-width="2.2" />
    <!-- Hair Outline (Shifted up to clear the forehead) -->
    <path d="M 8.2 13 C 8.2 7 21.8 7 21.8 13 L 21.8 14 Q 20.7 12.3 19.8 13.7 Q 18.5 12 17.5 13.7 Q 16.2 11.7 15.0 13.3 Q 13.8 11.7 12.5 13.7 Q 11.5 12 10.2 13.7 Q 9.3 12.3 8.2 14 Z" fill="#ffffff" stroke="#ffffff" stroke-width="2.2" stroke-linejoin="round" />
  
    
      <circle cx="10.5" cy="27" r="1.8" fill="#ffffff" />
      <circle cx="19.5" cy="27" r="1.8" fill="#ffffff" />
    
  </g>

  <g transform="translate(1.5, 3)">
    
    <!-- Body -->
    <ellipse cx="15" cy="23.5" rx="5.5" ry="5.0" fill="url(#skinGrad)" stroke="#1E1B18" stroke-width="0.8" />
    <!-- White Pants / Diaper -->
    <path d="M 9.5 25.5 C 9.5 28.5 20.5 28.5 20.5 25.5 Z" fill="#ffffff" stroke="#1E1B18" stroke-width="0.8" />
    <line x1="9.5" y1="25.5" x2="20.5" y2="25.5" stroke="#1E1B18" stroke-width="0.8" />

    <!-- Head (Tall Vertical Egg Shape) -->
    <ellipse cx="15" cy="16.5" rx="6.5" ry="8.0" fill="url(#skinGrad)" stroke="#1E1B18" stroke-width="0.8" />

    <!-- Hair (Spiky fringe on forehead - shifted up) -->
    <path d="M 8.2 13 C 8.2 7 21.8 7 21.8 13 L 21.8 14 Q 20.7 12.3 19.8 13.7 Q 18.5 12 17.5 13.7 Q 16.2 11.7 15.0 13.3 Q 13.8 11.7 12.5 13.7 Q 11.5 12 10.2 13.7 Q 9.3 12.3 8.2 14 Z" fill="url(#hairGrad)" stroke="#1E1B18" stroke-width="0.8" stroke-linejoin="round" />
  
    
      <circle cx="10.5" cy="26.5" r="1.3" fill="url(#skinGrad)" stroke="#1E1B18" stroke-width="0.8" />
      <circle cx="19.5" cy="26.5" r="1.3" fill="url(#skinGrad)" stroke="#1E1B18" stroke-width="0.8" />
      
      <!-- Eyebrows and eyes relative to sit headY (16.5) -->
      <path d="M 12.0 15.3 Q 13.0 14.3 14.0 15.3" fill="none" stroke="#1E1B18" stroke-width="0.5" stroke-linecap="round" />
      <path d="M 16.0 15.3 Q 17.0 14.3 18.0 15.3" fill="none" stroke="#1E1B18" stroke-width="0.5" stroke-linecap="round" />
      <ellipse cx="13.0" cy="17" rx="0.6" ry="1.3" fill="#1E1B18" />
      <ellipse cx="17.0" cy="17" rx="0.6" ry="1.3" fill="#1E1B18" />
      <circle cx="15" cy="20.5" r="0.8" fill="#742A2A" stroke="#1E1B18" stroke-width="0.5" />
      
      <!-- Resting Snot -->
      <path d="M 15 17.7 L 14.8 21 C 14.5 21.7 15.5 21.7 15.2 21 L 15 17.7" fill="url(#snotGrad)" stroke="#1E1B18" stroke-width="0.8" stroke-linejoin="round" />
    
  </g>
</svg>