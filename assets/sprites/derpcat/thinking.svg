<svg viewBox="0 0 32 32" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="1.5" stdDeviation="1" flood-color="#000" flood-opacity="0.25" />
    </filter>
  </defs>
  <style>
    @keyframes tilt {
      0%, 100% { transform: rotate(-3deg); }
      50% { transform: rotate(-1deg); }
    }
    @keyframes dot-fade {
      0%, 100% { opacity: 0.2; }
      50% { opacity: 1; }
    }
    .thinking-pet {
      animation: tilt 2.5s infinite ease-in-out;
      transform-origin: 12px 20px;
    }
    .dot1 { animation: dot-fade 1.2s infinite; animation-delay: 0s; }
    .dot2 { animation: dot-fade 1.2s infinite; animation-delay: 0.3s; }
    .dot3 { animation: dot-fade 1.2s infinite; animation-delay: 0.6s; }
  </style>
  <g transform="translate(4, 4)">
    <!-- White background outline silhouette -->
    <g class="thinking-pet" fill="#ffffff" stroke="#ffffff" stroke-width="1.6" stroke-linejoin="miter" filter="url(#shadow)">
      <path d="M 5 5 L 5 2 H 7 V 5 H 17 V 2 H 19 V 5 V 10 H 22 V 13 H 19 V 14 H 23 V 8 H 21 V 14 H 19 V 17 H 17 V 20 H 15 V 17 H 9 V 20 H 7 V 17 H 5 V 13 H 2 V 10 H 5 Z" />
    </g>
    
    <!-- Foreground dark grey -->
    <g class="thinking-pet">
      <path d="M 5 5 L 5 2 H 7 V 5 H 17 V 2 H 19 V 5 V 10 H 22 V 13 H 19 V 14 H 23 V 8 H 21 V 14 H 19 V 17 H 17 V 20 H 15 V 17 H 9 V 20 H 7 V 17 H 5 V 13 H 2 V 10 H 5 Z" fill="#1E1B18" />
      
      <!-- Looking up eyes -->
      <rect x="7" y="7" width="3" height="3" fill="#ffffff" />
      <rect x="14" y="7" width="3" height="3" fill="#ffffff" />
      <rect x="7.8" y="7" width="1.2" height="1.2" fill="#000000" />
      <rect x="14.8" y="7" width="1.2" height="1.2" fill="#000000" />
    </g>

    <!-- Thought bubble -->
    <circle cx="21" cy="4" r="0.6" fill="#fff" stroke="#1E1B18" stroke-width="0.5" />
    <circle cx="23" cy="2.3" r="0.9" fill="#fff" stroke="#1E1B18" stroke-width="0.5" />
    <rect x="21" y="-4" width="7" height="4.5" rx="1.8" fill="#ffffff" stroke="#1E1B18" stroke-width="0.6" />
    <circle class="dot1" cx="23" cy="-1.8" r="0.4" fill="#000" />
    <circle class="dot2" cx="24.5" cy="-1.8" r="0.4" fill="#000" />
    <circle class="dot3" cx="26" cy="-1.8" r="0.4" fill="#000" />
  </g>
</svg>
