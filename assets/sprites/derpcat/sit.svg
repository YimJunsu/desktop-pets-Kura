<svg viewBox="0 0 32 32" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="1.5" stdDeviation="1" flood-color="#000" flood-opacity="0.25" />
    </filter>
  </defs>
  <style>
    .sit-pet {
      transform: scaleY(0.85) scaleX(1.05);
      transform-origin: 12px 20px;
    }
  </style>
  <g transform="translate(4, 4)">
    <!-- White background outline silhouette -->
    <g class="sit-pet" fill="#ffffff" stroke="#ffffff" stroke-width="1.6" stroke-linejoin="miter" filter="url(#shadow)">
      <path d="M 5 5 L 5 2 H 7 V 5 H 17 V 2 H 19 V 5 V 10 H 22 V 13 H 19 V 14 H 23 V 8 H 21 V 14 H 19 V 17 H 17 V 19.5 H 15 V 17 H 9 V 19.5 H 7 V 17 H 5 V 13 H 2 V 10 H 5 Z" />
    </g>
    
    <!-- Foreground dark grey -->
    <g class="sit-pet">
      <path d="M 5 5 L 5 2 H 7 V 5 H 17 V 2 H 19 V 5 V 10 H 22 V 13 H 19 V 14 H 23 V 8 H 21 V 14 H 19 V 17 H 17 V 19.5 H 15 V 17 H 9 V 19.5 H 7 V 17 H 5 V 13 H 2 V 10 H 5 Z" fill="#1E1B18" />
      
      <!-- Derpy looking down eyes -->
      <rect x="7" y="7" width="3" height="3" fill="#ffffff" />
      <rect x="14" y="7" width="3" height="3" fill="#ffffff" />
      <rect x="7.8" y="8.2" width="1.2" height="1.2" fill="#000000" />
      <rect x="14.8" y="8.2" width="1.2" height="1.2" fill="#000000" />
    </g>
  </g>
</svg>
