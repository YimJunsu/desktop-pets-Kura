<svg viewBox="0 0 32 32" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="1.5" stdDeviation="1.5" flood-color="#000" flood-opacity="0.25" />
    </filter>
  </defs>
  <style>
    @keyframes flail {
      0%, 100% { transform: translateY(0px) rotate(-3deg); }
      50% { transform: translateY(0.5px) rotate(3deg); }
    }
    .falling-pet {
      animation: flail 0.12s infinite ease-in-out;
      transform-origin: 12px 10px;
    }
    .leg-outer { transform: rotate(-15deg); transform-origin: 7px 17px; }
    .leg-inner-l { transform: rotate(-7deg); transform-origin: 9px 17px; }
    .leg-inner-r { transform: rotate(7deg); transform-origin: 15px 17px; }
    .leg-outer-r { transform: rotate(15deg); transform-origin: 17px 17px; }
  </style>
  <g transform="translate(4, 4)">
    <!-- White background outline silhouette -->
    <g class="falling-pet" fill="#ffffff" stroke="#ffffff" stroke-width="1.6" stroke-linejoin="miter" filter="url(#shadow)">
      <path d="M 5 5 L 5 2 H 7 V 5 H 17 V 2 H 19 V 5 V 10 H 22 V 13 H 19 V 14 H 23 V 8 H 21 V 14 H 19 V 17 H 5 V 13 H 2 V 10 H 5 Z" />
      <rect class="leg-outer" x="7" y="17" width="1" height="3" />
      <rect class="leg-inner-l" x="8.5" y="17" width="1" height="3" />
      <rect class="leg-inner-r" x="14.5" y="17" width="1" height="3" />
      <rect class="leg-outer-r" x="16" y="17" width="1" height="3" />
    </g>
    
    <!-- Foreground dark grey -->
    <g class="falling-pet" fill="#1E1B18">
      <path d="M 5 5 L 5 2 H 7 V 5 H 17 V 2 H 19 V 5 V 10 H 22 V 13 H 19 V 14 H 23 V 8 H 21 V 14 H 19 V 17 H 5 V 13 H 2 V 10 H 5 Z" />
      <rect class="leg-outer" x="7" y="17" width="1" height="3" />
      <rect class="leg-inner-l" x="8.5" y="17" width="1" height="3" />
      <rect class="leg-inner-r" x="14.5" y="17" width="1" height="3" />
      <rect class="leg-outer-r" x="16" y="17" width="1" height="3" />
      
      <!-- Startled small dot eyes -->
      <rect x="7" y="7" width="3" height="3" fill="#ffffff" />
      <rect x="14" y="7" width="3" height="3" fill="#ffffff" />
      <rect x="8" y="8" width="1" height="1" fill="#000000" />
      <rect x="15" y="8" width="1" height="1" fill="#000000" />
    </g>
  </g>
</svg>
