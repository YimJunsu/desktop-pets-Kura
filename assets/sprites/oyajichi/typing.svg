<svg viewBox="0 0 32 32" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="1.5" stdDeviation="1" flood-color="#000" flood-opacity="0.2" />
    </filter>
  </defs>
  <style>
    @keyframes blink {
      0%, 90%, 100% { transform: scaleY(1); }
      95% { transform: scaleY(0.1); }
    }
    .eye {
      transform-origin: center;
      animation: blink 4s infinite;
      transition: transform 0.1s ease-out;
    }
    @keyframes type-action {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-1.5px); }
    }
    .hand-l {
      animation: type-action 0.2s infinite;
    }
    .hand-r {
      animation: type-action 0.2s infinite 0.1s;
    }
    @keyframes type-code-1 {
      0%, 100% { width: 0; }
      15%, 85% { width: 4.5px; }
    }
    @keyframes type-code-2 {
      0%, 20%, 100% { width: 0; }
      35%, 85% { width: 5.5px; }
    }
    @keyframes type-code-3 {
      0%, 40%, 100% { width: 0; }
      55%, 85% { width: 3.5px; }
    }
    @keyframes type-code-4 {
      0%, 60%, 100% { width: 0; }
      75%, 85% { width: 5px; }
    }
    .code-line-1 {
      animation: type-code-1 1.5s infinite steps(4, end);
    }
    .code-line-2 {
      animation: type-code-2 1.5s infinite steps(5, end);
    }
    .code-line-3 {
      animation: type-code-3 1.5s infinite steps(3, end);
    }
    .code-line-4 {
      animation: type-code-4 1.5s infinite steps(5, end);
    }
  </style>
  <g id="pet-body" transform="translate(4, 4)">
    <!-- White Outline for Sticker Effect -->
    <path d="M 12 4 Q 13 2 12 1 T 13 -1 M 12 4 C 5 4 3 8 3 13 C 3 19 6 20 12 20 C 18 20 21 19 21 13 C 21 8 19 4 12 4 M 3 10 C 1.5 10 0.5 11 0.5 12.5 C 0.5 14 2 14.5 3 13.5 M 21 10 C 22.5 10 23.5 11 23.5 12.5 C 23.5 14 22 14.5 21 13.5 M 8 20 L 10 21 M 16 20 L 14 21 M 6 18.5 H 18 V 21.5 H 6 Z"
          fill="none"
          stroke="#ffffff"
          stroke-width="2.5"
          stroke-linejoin="round"
          stroke-linecap="round"
          filter="url(#shadow)" />

    <!-- Legs -->
    <path d="M 8 20 L 10 21 M 16 20 L 14 21" fill="none" stroke="#1E1B18" stroke-width="1.2" stroke-linecap="round" />

    <!-- Main Face Body -->
    <ellipse cx="12" cy="12" rx="9" ry="8" fill="#FCE0C5" stroke="#1E1B18" stroke-width="1.0" />

    <!-- Curly Side Hair -->
    <path d="M 3 10 C 2 9.5 1 10 1 11 C 1 12 2 12.5 3 12.5 C 2 12.5 1.5 13 1.5 14 C 1.5 15 2.5 15.5 3.5 15" fill="#1E1B18" stroke="#1E1B18" stroke-width="0.5" />
    <path d="M 21 10 C 22 9.5 23 10 23 11 C 23 12 22 12.5 21 12.5 C 22 12.5 22.5 13 22.5 14 C 22.5 15 21.5 15.5 20.5 15" fill="#1E1B18" stroke="#1E1B18" stroke-width="0.5" />

    <!-- Mustache -->
    <path d="M 6.2 15.2 Q 8.5 13.6 12 13.6 Q 15.5 13.6 17.8 15.2 Q 15.5 14.2 12 14.2 Q 8.5 14.2 6.2 15.2 Z" fill="#1E1B18" stroke="#1E1B18" stroke-width="0.5" />

    <!-- Mouth & Chin -->
    <ellipse cx="12" cy="16.2" rx="3" ry="1.5" fill="#F5BCAE" />
    <line x1="10.5" y1="16.2" x2="13.5" y2="16.2" stroke="#1E1B18" stroke-width="0.8" stroke-linecap="round" />

    <!-- Eyebrows -->
    <path d="M 6.5 8 L 9 8" stroke="#1E1B18" stroke-width="1.2" stroke-linecap="round" />
    <path d="M 15 8 L 17.5 8" stroke="#1E1B18" stroke-width="1.2" stroke-linecap="round" />

    <!-- Eyes (Looking down at keyboard) -->
    <g id="eyes">
      <circle id="left-eye" cx="7.8" cy="9.8" r="0.75" fill="#0E2F44" />
      <circle id="right-eye" cx="16.2" cy="9.8" r="0.75" fill="#0E2F44" />
    </g>

    <!-- Top Single Hair -->
    <path d="M 12 4 Q 13 2 12 1 T 13 -1" fill="none" stroke="#1E1B18" stroke-width="1.0" stroke-linecap="round" />

    <!-- Mini Keyboard -->
    <rect x="6" y="18" width="12" height="3" fill="#e5e7eb" stroke="#1E1B18" stroke-width="0.8" rx="0.5" />
    <line x1="7.5" y1="19.5" x2="16.5" y2="19.5" stroke="#9ca3af" stroke-dasharray="1.5 1" stroke-width="0.6" />

    <!-- Tiny typing hands (with CSS animation) -->
    <circle class="hand-l" cx="8" cy="17.5" r="0.8" fill="#1E1B18" />
    <circle class="hand-r" cx="16" cy="17.5" r="0.8" fill="#1E1B18" />
  </g>

  <!-- CMD Window on the top right -->
  <g class="cmd-window" filter="url(#shadow)">
    <!-- Window Border/Screen -->
    <rect x="22" y="3" width="8" height="6" rx="0.5" fill="#1e1e1e" stroke="#9ca3af" stroke-width="0.4" />
    <!-- Top Bar -->
    <rect x="22" y="3" width="8" height="1.2" rx="0.3" fill="#333333" />
    <!-- Window buttons -->
    <circle cx="23.0" cy="3.6" r="0.25" fill="#ef4444" />
    <circle cx="23.7" cy="3.6" r="0.25" fill="#f59e0b" />
    <circle cx="24.4" cy="3.6" r="0.25" fill="#10b981" />
    <!-- Code Lines -->
    <rect class="code-line-1" x="23" y="4.8" width="0" height="0.4" fill="#22c55e" />
    <rect class="code-line-2" x="23" y="5.6" width="0" height="0.4" fill="#22c55e" />
    <rect class="code-line-3" x="23" y="6.4" width="0" height="0.4" fill="#22c55e" />
    <rect class="code-line-4" x="23" y="7.2" width="0" height="0.4" fill="#22c55e" />
  </g>
</svg>
