<svg viewBox="0 0 32 32" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="1.5" stdDeviation="1" flood-color="#000" flood-opacity="0.2" />
    </filter>
  </defs>
  <g id="pet-body" transform="translate(4, 3)">
    <!-- White Outline for Sticker Effect -->
    <path d="M 12 4 Q 13 0 12 -2 T 13 -4 M 12 4 C 5 4 3 8 3 13 C 3 19 6 20 12 20 C 18 20 21 19 21 13 C 21 8 19 4 12 4 M 3 10 C 1.5 10 0.5 11 0.5 12.5 C 0.5 14 2 14.5 3 13.5 M 21 10 C 22.5 10 23.5 11 23.5 12.5 C 23.5 14 22 14.5 21 13.5 M 7 20 Q 5 18 4 17 M 17 20 Q 19 18 20 17"
          fill="none"
          stroke="#ffffff"
          stroke-width="2.5"
          stroke-linejoin="round"
          stroke-linecap="round"
          filter="url(#shadow)" />

    <!-- Legs flailing upwards -->
    <path d="M 7 20 Q 5 18 4 17 M 17 20 Q 19 18 20 17" fill="none" stroke="#1E1B18" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round" />

    <!-- Main Face Body -->
    <ellipse cx="12" cy="12" rx="9" ry="8" fill="#FCE0C5" stroke="#1E1B18" stroke-width="1.0" />

    <!-- Curly Side Hair -->
    <path d="M 3 10 C 2 9.5 1 10 1 11 C 1 12 2 12.5 3 12.5 C 2 12.5 1.5 13 1.5 14 C 1.5 15 2.5 15.5 3.5 15" fill="#1E1B18" stroke="#1E1B18" stroke-width="0.5" />
    <path d="M 21 10 C 22 9.5 23 10 23 11 C 23 12 22 12.5 21 12.5 C 22 12.5 22.5 13 22.5 14 C 22.5 15 21.5 15.5 20.5 15" fill="#1E1B18" stroke="#1E1B18" stroke-width="0.5" />

    <!-- Mustache -->
    <path d="M 6.2 15.2 Q 8.5 13.6 12 13.6 Q 15.5 13.6 17.8 15.2 Q 15.5 14.2 12 14.2 Q 8.5 14.2 6.2 15.2 Z" fill="#1E1B18" stroke="#1E1B18" stroke-width="0.5" />

    <!-- Surprised mouth -->
    <circle cx="12" cy="16.5" r="1.5" fill="#F5BCAE" stroke="#1E1B18" stroke-width="0.8" />

    <!-- Scared Eyebrows -->
    <path d="M 6.0 7.2 L 8.5 6.5" stroke="#1E1B18" stroke-width="1.2" stroke-linecap="round" />
    <path d="M 15.5 6.5 L 18.0 7.2" stroke="#1E1B18" stroke-width="1.2" stroke-linecap="round" />

    <!-- Scared Eyes -->
    <g id="eyes">
      <circle id="left-eye" cx="7.8" cy="9.2" r="1.0" fill="#0E2F44" />
      <circle id="right-eye" cx="16.2" cy="9.2" r="1.0" fill="#0E2F44" />
    </g>

    <!-- Top Single Hair (pointing straight up) -->
    <path d="M 12 4 Q 13 0 12 -2 T 13 -4" fill="none" stroke="#1E1B18" stroke-width="1.0" stroke-linecap="round" />
  </g>
</svg>
