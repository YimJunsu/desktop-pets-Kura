<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self' https://generativelanguage.googleapis.com; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data: http://127.0.0.1:18900 http://localhost:18900;">
  <title>Kuro Desktop Pet</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div id="app">
    <!-- AI Response Chat Bubble (Above Pet Head) -->
    <div id="chat-container" class="hidden">
      <div id="chat-bubble">
        <div id="chat-messages"></div>
      </div>
    </div>

    <!-- Chat Input Dialog Panel (Fixed Bottom Right) -->
    <div id="chat-input-panel" class="hidden">
      <input type="text" id="chat-input" placeholder="Type a message..." />
      <button id="chat-send-btn">Send</button>
    </div>

    <!-- Pet Sprite Container -->
    <div id="pet-container">
      <!-- Settings Gear & Chat Bubble (Hover UI) -->
      <div id="settings-gear" title="Settings">⚙️</div>
      <div id="chat-trigger" title="Chat">💬</div>
      <!-- Inline SVG will be injected here by animation.js -->
    </div>

  <!-- Scripts -->
  <script src="state-machine.js"></script>
  <script src="animation.js"></script>
  <script src="eye-tracker.js"></script>
  <script src="drag-handler.js"></script>
  <script src="follow-mode.js"></script>
  <script src="chat-bubble.js"></script>
  <script src="renderer.js"></script>
</body>
</html>
