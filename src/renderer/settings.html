<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Gemini API Settings</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      padding: 20px;
      margin: 0;
      background: #f9fafb;
      color: #1f2937;
    }
    .container {
      display: flex;
      flex-direction: column;
      gap: 16px;
    }
    h2 {
      margin: 0;
      font-size: 18px;
      color: #D97757;
    }
    .form-group {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }
    label {
      font-size: 13px;
      font-weight: 600;
      color: #4b5563;
    }
    input[type="password"], input[type="text"] {
      padding: 8px 12px;
      border: 1px solid #d1d5db;
      border-radius: 8px;
      font-size: 13px;
      outline: none;
      transition: border 0.2s ease;
    }
    input:focus {
      border-color: #D97757;
      box-shadow: 0 0 0 2px rgba(217, 119, 87, 0.15);
    }
    .hint {
      font-size: 11px;
      color: #6b7280;
      line-height: 1.4;
    }
    .buttons {
      display: flex;
      justify-content: flex-end;
      gap: 10px;
      margin-top: 10px;
    }
    button {
      padding: 8px 16px;
      border-radius: 8px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      border: none;
      transition: all 0.2s ease;
    }
    .btn-save {
      background: #D97757;
      color: white;
    }
    .btn-save:hover {
      background: #c25e3c;
    }
    .btn-cancel {
      background: #e5e7eb;
      color: #4b5563;
    }
    .btn-cancel:hover {
      background: #d1d5db;
    }
  </style>
</head>
<body>
  <div class="container">
    <h2>Gemini API Settings</h2>
    
    <div class="form-group">
      <label for="api-key">Gemini API Key</label>
      <input type="password" id="api-key" placeholder="AIzaSy..." />
      <span class="hint">
        Your API key is stored locally and used directly to communicate with Gemini API.
        You can get a free key from Google AI Studio.
      </span>
    </div>
    
    <div class="buttons">
      <button class="btn-cancel" id="btn-cancel">Cancel</button>
      <button class="btn-save" id="btn-save">Save Settings</button>
    </div>
  </div>

  <script>
    const apiKeyInput = document.getElementById('api-key');
    const btnCancel = document.getElementById('btn-cancel');
    const btnSave = document.getElementById('btn-save');

    // Load existing settings
    window.api.getSettings().then(settings => {
      if (settings.geminiApiKey) {
        apiKeyInput.value = settings.geminiApiKey;
      }
    });

    btnCancel.addEventListener('click', () => {
      window.close();
    });

    btnSave.addEventListener('click', async () => {
      const key = apiKeyInput.value.trim();
      
      try {
        // Save to store
        await window.api.updateSettings('geminiApiKey', key);
        
        // Notify parent window to update key in memory
        // (Renderer listens to state commands for general updates)
        // Wait, settings window can close itself
        window.close();
      } catch (err) {
        alert('Failed to save settings: ' + err.message);
      }
    });
  </script>
</body>
</html>
